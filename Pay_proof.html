<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Proof - InvestingHubPK</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; text-align: center; }
        .urdu-font { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.5; }
        .container { padding: 30px 20px; max-width: 450px; margin: 50px auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .icon-box { font-size: 50px; color: #4b0082; margin-bottom: 20px; }
        h2 { color: #4b0082; margin-bottom: 15px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .upload-area {
            border: 2px dashed #4b0082;
            padding: 30px;
            border-radius: 15px;
            background: #f9f9f9;
            cursor: pointer;
            margin-bottom: 25px;
        }
        input[type="file"] { display: none; }
        .upload-label { color: #4b0082; font-weight: bold; cursor: pointer; }
        
        .submit-btn {
            background: #4b0082;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-box">📸</div>
        <h2 class="urdu-font">رسید اپ لوڈ کریں</h2>
        <p class="urdu-font">براہ کرم اپنی پیمنٹ کے اسکرین شاٹ یا رسید کی تصویر اپ لوڈ کریں تاکہ ہم آپ کا اکاؤنٹ ایکٹو کر سکیں۔</p>
        
        <form action="success.html">
            <label class="upload-area">
                <input type="file" accept="image/*" required>
                <span class="upload-label urdu-font">تصویر منتخب کریں 📁</span>
            </label>
            <button type="submit" class="submit-btn urdu-font">فائل جمع کروائیں 🚀</button>
        </form>
    </div>
</body>
</html>
